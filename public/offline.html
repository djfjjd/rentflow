<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#176B5B" />
    <title>렌트플로우 오프라인</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8fafc;
        color: #111827;
        font-family: Arial, sans-serif;
      }
      main {
        width: min(420px, calc(100% - 32px));
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #fff;
        padding: 24px;
      }
      h1 {
        margin: 0;
        font-size: 24px;
      }
      p {
        margin: 12px 0 0;
        line-height: 1.6;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>오프라인 상태입니다</h1>
      <p>렌트플로우 기본 화면은 캐시되어 있으며, 네트워크가 복구되면 최신 데이터를 다시 불러옵니다.</p>
    </main>
  </body>
</html>
